apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-chatbot-backend
  namespace: rag-chatbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-chatbot-backend
  template:
    metadata:
      labels:
        app: rag-chatbot-backend
    spec:
      containers:
        - name: backend
          image: url.hrlim.nexus:31500/rag-chatbot-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: rag-chatbot-config
            - secretRef:
                name: rag-chatbot-secret
                optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
